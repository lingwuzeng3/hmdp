server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: ${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DATABASE_URL:jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&characterEncoding=utf8}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:123456}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段

# 可选：单独指定 Redisson 地址；留空则使用 spring.redis.host + port
redisson:
  single-server-address: ${REDISSON_ADDRESS:}

mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
